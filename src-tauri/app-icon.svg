<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 배경: 보라-인디고 그라데이션 라운드 사각형 (웹 favicon 색상 계승) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="192" fill="url(#bg)"/>

  <!-- 검신 (좌하 → 우상 대각선) -->
  <g fill="#ffffff">
    <path d="M 700 220 L 804 324 L 416 712 L 312 608 Z"/>
    <!-- 검 끝 -->
    <path d="M 700 220 L 830 194 L 804 324 Z"/>
    <!-- 가드(크로스가드) -->
    <path d="M 268 564 L 460 756 L 416 800 L 224 608 Z"/>
    <!-- 손잡이 -->
    <path d="M 282 742 L 330 790 L 222 898 L 174 850 Z"/>
    <!-- 폼멜 -->
    <circle cx="170" cy="854" r="34"/>
  </g>

  <!-- 전투력 상승 화살표 모티프 (우하단 스파크) -->
  <g fill="#fbbf24">
    <path d="M 712 624 L 744 688 L 808 720 L 744 752 L 712 816 L 680 752 L 616 720 L 680 688 Z"/>
  </g>
</svg>
